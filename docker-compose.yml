services:
  pndc:
    build: .
    restart: unless-stopped
    # No published ports: cloudflared reaches it over the internal network only.
    # The bot binds 0.0.0.0:8787 (set api_port|pntools|8787 in env.pandora).
    environment:
      # Reach the host's provider-managed qBittorrent WebUI from inside the
      # container. host.docker.internal resolves to the host via the gateway
      # mapping below. Override creds with PNP2P_QBIT_USER/PNP2P_QBIT_PASS.
      - PNP2P_QBIT_HOST=http://host.docker.internal:8089
      - PANDORA_GITSYNC_REPO=/repo
      - PANDORA_GITSYNC_USERNAME=${PANDORA_GITSYNC_USERNAME:-x-access-token}
      - PANDORA_GITSYNC_TOKEN=${PANDORA_GITSYNC_TOKEN:-}
      # The host qBittorrent writes to the HOST filesystem, but the container
      # reads from the bind-mounted ./DB. Set PNP2P_QBIT_SAVE_HOST in .env to
      # the host's absolute path to ./DB so downloads land where the container
      # can see them (e.g. Windows: C:\Users\you\pandora-toolchain\DB). The
      # container's /app/DB prefix is swapped for this when telling qBittorrent
      # where to save. Leave empty for a same-host (non-Docker) qBittorrent.
      - PNP2P_QBIT_SAVE_HOST=${PNP2P_QBIT_SAVE_HOST:-}
    extra_hosts:
      - "host.docker.internal:host-gateway"
    volumes:
      - ./DB:/app/DB
      - .:/repo
    networks:
      - pandora

  cloudflared:
    image: cloudflare/cloudflared:latest
    restart: unless-stopped
    command: tunnel --no-autoupdate run
    environment:
      # Token from the dashboard-created tunnel (Zero Trust > Networks > Tunnels).
      - TUNNEL_TOKEN=${TUNNEL_TOKEN}
    depends_on:
      - pndc
    networks:
      - pandora

networks:
  pandora:
